services:
  postgres:
    image: postgres:16
    container_name: riskdelta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: riskdelta
      POSTGRES_PASSWORD: riskdelta
      POSTGRES_DB: riskdelta
    ports:
      - "5433:5432"
    volumes:
      - riskdelta-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskdelta -d riskdelta"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: riskdelta-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - riskdelta-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: riskdelta-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: riskdelta_minio
      MINIO_ROOT_PASSWORD: replace-with-long-secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - riskdelta-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  riskdelta-postgres:
  riskdelta-redis:
  riskdelta-minio:
